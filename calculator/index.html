<!DOCTYPE html>
<html>
<head>
    <title>Calculator UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body >

    <div class="calculator">
        <input type="text" id="display" placeholder="0" readonly>

        <div class="buttons">
            <button>C</button>
            <button>%</button>
            <button>/</button>
            <button>*</button>

            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button>-</button>

            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>+</button>

            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>=</button>

            <button class="zero">0</button>
            <button>.</button>
        </div>
    </div>

    <script src="cal.js"></script>

</body>
</html>
